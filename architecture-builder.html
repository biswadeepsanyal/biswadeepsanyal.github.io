
<!DOCTYPE html>
<html>
<head>
<title>Architecture Builder</title>

<style>
body{font-family:Arial;background:#0b0f19;color:white}
.container{display:flex;padding:40px}
.toolbox{width:200px;background:#111827;padding:20px;border-radius:8px}
.component{background:#2563eb;padding:10px;margin:10px 0;cursor:grab;border-radius:6px}
.canvas{flex:1;background:#1f2937;margin-left:20px;padding:20px;border-radius:8px;min-height:300px}
</style>

<script>
function allowDrop(ev){ev.preventDefault()}
function drag(ev){ev.dataTransfer.setData("text",ev.target.innerText)}
function drop(ev){
ev.preventDefault()
const data=ev.dataTransfer.getData("text")
const div=document.createElement("div")
div.innerText=data
div.style.background="#22c55e"
div.style.margin="10px"
div.style.padding="10px"
ev.target.appendChild(div)
}
</script>
</head>

<body>

<h1 style="text-align:center">AI Architecture Builder</h1>

<div class="container">

<div class="toolbox">
<div class="component" draggable="true" ondragstart="drag(event)">API Gateway</div>
<div class="component" draggable="true" ondragstart="drag(event)">Embedding Model</div>
<div class="component" draggable="true" ondragstart="drag(event)">Vector Database</div>
<div class="component" draggable="true" ondragstart="drag(event)">LLM</div>
</div>

<div class="canvas" ondrop="drop(event)" ondragover="allowDrop(event)">
Drop components here
</div>

</div>

</body>
</html>
