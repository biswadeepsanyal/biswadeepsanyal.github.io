
<!DOCTYPE html>
<html>
<head>
<title>Attention Matrix</title>
<style>
body{font-family:Arial;background:#0b0f19;color:white;text-align:center}
canvas{background:#111827;margin-top:20px}
</style>
</head>

<body>

<h1>Transformer Attention Matrix</h1>
<canvas id="matrix" width="500" height="500"></canvas>

<script>
const tokens=["Transformers","use","self","attention","mechanisms"]
const canvas=document.getElementById("matrix")
const ctx=canvas.getContext("2d")
const size=80

for(let i=0;i<tokens.length;i++){
for(let j=0;j<tokens.length;j++){
const value=Math.random()
const color=Math.floor(255*(1-value))
ctx.fillStyle=`rgb(${color},${color},255)`
ctx.fillRect(j*size,i*size,size,size)
}
}
</script>

</body>
</html>
