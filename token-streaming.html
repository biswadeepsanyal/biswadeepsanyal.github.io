
<!DOCTYPE html>
<html>
<head>
<title>Token Streaming</title>
<style>
body{font-family:Arial;background:#0b0f19;color:white;text-align:center}
.output{background:#111827;padding:20px;border-radius:8px;width:60%;margin:auto}
</style>

<script>
function stream(){
const text="Large language models generate tokens sequentially."
const words=text.split(" ")
const out=document.getElementById("output")
out.innerHTML=""
words.forEach((w,i)=>{
setTimeout(()=>{
out.innerHTML+=w+" "
},i*250)
})
}
</script>
</head>

<body>

<h1>Token Streaming Visualization</h1>
<button onclick="stream()">Generate</button>

<div id="output" class="output"></div>

</body>
</html>
